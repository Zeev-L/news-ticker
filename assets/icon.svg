<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#26324a"/>
      <stop offset="0.55" stop-color="#182335"/>
      <stop offset="1" stop-color="#0d1420"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- macOS squircle background -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- three ticker rows: calendar (blue), news (red), tasks (green) -->
  <g filter="url(#soft)">
    <!-- row 1 -->
    <rect x="180" y="300" width="664" height="118" rx="30" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="210" y="336" width="330" height="20" rx="10" fill="#ffffff" fill-opacity="0.9"/>
    <rect x="210" y="368" width="230" height="18" rx="9" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="694" y="300" width="150" height="118" rx="30" fill="#1f7ae0"/>
    <circle cx="769" cy="359" r="13" fill="#ffffff" fill-opacity="0.95"/>

    <!-- row 2 -->
    <rect x="180" y="453" width="664" height="118" rx="30" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="210" y="489" width="390" height="20" rx="10" fill="#ffffff" fill-opacity="0.9"/>
    <rect x="210" y="521" width="270" height="18" rx="9" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="694" y="453" width="150" height="118" rx="30" fill="#d81f2a"/>
    <circle cx="769" cy="512" r="13" fill="#ffffff" fill-opacity="0.95"/>

    <!-- row 3 -->
    <rect x="180" y="606" width="664" height="118" rx="30" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="210" y="642" width="300" height="20" rx="10" fill="#ffffff" fill-opacity="0.9"/>
    <rect x="210" y="674" width="200" height="18" rx="9" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="694" y="606" width="150" height="118" rx="30" fill="#1f9d55"/>
    <circle cx="769" cy="665" r="13" fill="#ffffff" fill-opacity="0.95"/>
  </g>
</svg>
