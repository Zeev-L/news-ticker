<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --line: #e5e8ec; --text: #1c1f26;
    --muted: #6b7280; --accent: #2f6fed; --accent-soft: #eaf1ff;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#15171c; --card:#1e2128; --line:#2c303a; --text:#eef1f6; --muted:#9aa2b1; --accent:#5b9dff; --accent-soft:#22314d; }
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--text); font-size:14px; padding:20px 20px 76px; }
  h1 { font-size:18px; margin:0 0 12px; }
  .tabs { display:flex; gap:2px; margin-bottom:16px; border-bottom:1px solid var(--line); }
  .tab { font:inherit; border:none; background:transparent; color:var(--muted); padding:9px 16px; cursor:pointer;
    border-bottom:2px solid transparent; font-weight:600; display:flex; align-items:center; gap:7px; }
  .tab .dotc { width:9px; height:9px; border-radius:50%; }
  .tab.active { color:var(--text); border-bottom-color:var(--accent); }
  .panel.hidden { display:none; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  .lane-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .lane-head h2 { font-size:15px; margin:0; }
  .lane-body.off { opacity:.4; pointer-events:none; }
  .row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:6px 0; }
  .row label { font-weight:500; }
  .hint { color:var(--muted); font-size:12px; margin-top:2px; }
  select, input[type="text"], input[type="password"], input[type="number"] {
    font:inherit; padding:7px 10px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); color:var(--text); min-width:120px; }
  input[type="range"] { width:150px; }
  input[type="color"] { width:34px; height:26px; padding:0; border:1px solid var(--line); border-radius:6px; background:var(--bg); flex:none; }
  .seg { display:inline-flex; background:var(--bg); border:1px solid var(--line); border-radius:9px; overflow:hidden; }
  .seg button { font:inherit; border:none; background:transparent; color:var(--text); padding:6px 13px; cursor:pointer; }
  .seg button.active { background:var(--accent); color:#fff; }
  .src { display:flex; align-items:center; gap:8px; padding:7px; border:1px solid var(--line); border-radius:9px; margin-bottom:7px; }
  .src input[type="text"] { flex:1; min-width:0; }
  .src .name { width:120px; flex:none; }
  .src .del { background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:15px; padding:4px 7px; border-radius:6px; }
  .src .del:hover { background:var(--accent-soft); color:var(--accent); }
  .cal-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .addbtn { font:inherit; background:transparent; border:1px dashed var(--line); color:var(--muted); padding:7px; border-radius:9px; width:100%; cursor:pointer; }
  .addbtn:hover { border-color:var(--accent); color:var(--accent); }
  .toggle { position:relative; width:42px; height:24px; flex:none; display:inline-block; }
  .toggle input { position:absolute; inset:0; width:100%; height:100%; margin:0; opacity:0; cursor:pointer; z-index:2; }
  .slider { position:absolute; inset:0; background:#c4c9d2; border-radius:999px; transition:.2s; cursor:pointer; }
  .slider::before { content:""; position:absolute; width:18px; height:18px; right:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
  .toggle input:checked + .slider { background:var(--accent); }
  .toggle input:checked + .slider::before { transform:translateX(-18px); }
  .footer { position:fixed; bottom:0; right:0; left:0; display:flex; gap:10px; align-items:center;
    padding:12px 20px; background:var(--bg); border-top:1px solid var(--line); }
  .btn { font:inherit; padding:9px 18px; border-radius:9px; border:1px solid var(--line); background:var(--card); color:var(--text); cursor:pointer; font-weight:600; }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.primary:hover { filter:brightness(1.05); }
  .btn.sm { padding:6px 12px; font-size:13px; }
  .saved { color:#1a9e57; font-size:12.5px; opacity:0; transition:opacity .2s; }
  .saved.show { opacity:1; }
  .keyhint { font-size:12px; color:var(--muted); margin-top:4px; }
  code { background:var(--bg); padding:1px 6px; border-radius:5px; border:1px solid var(--line); }
  .gstatus { font-size:12.5px; margin-top:6px; }
  .gstatus.ok { color:#1a9e57; }
  .gstatus.err { color:#d64545; }
  .glink { color:var(--accent); cursor:pointer; text-decoration:underline; }
  .colors { display:flex; gap:16px; align-items:center; }
  .colors .c { display:flex; align-items:center; gap:6px; }
  .subttl { font-size:13px; font-weight:600; color:var(--muted); margin:12px 0 8px; }
</style>
</head>
<body>
  <h1>הגדרות</h1>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>

  <div class="footer">
    <button class="btn primary" id="save">שמור</button>
    <span class="saved" id="saved">✓ נשמר</span>
  </div>

<script>
  let s = null;
  const el = id => document.getElementById(id);
  const esc = v => String(v == null ? '' : v).replace(/"/g, '&quot;');
  const escT = v => String(v == null ? '' : v).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function rgbToHex(rgb){ const p=String(rgb||'17,19,24').split(',').map(n=>parseInt(n,10)||0); return '#'+p.slice(0,3).map(x=>x.toString(16).padStart(2,'0')).join(''); }
  function hexToRgb(hex){ const m=String(hex||'#111318').replace('#',''); return [0,2,4].map(i=>parseInt(m.substr(i,2),16)||0).join(','); }

  function laneCard(lane) {
    const isRss = lane.kind === 'rss';
    const isCal = lane.kind === 'calendar';
    const modeScroll = lane.mode === 'scroll';
    return `
    <div class="card lane" data-id="${esc(lane.id)}">
      <div class="lane-head">
        <h2>${escT(lane.title)}</h2>
        <span class="toggle"><input type="checkbox" class="f-enabled" ${lane.enabled?'checked':''}><span class="slider"></span></span>
      </div>
      <div class="lane-body ${lane.enabled?'':'off'}">
        <div class="row"><label>מיקום על המסך</label>
          <div class="seg f-position">
            <button data-v="top" class="${lane.position==='top'?'active':''}">למעלה</button>
            <button data-v="bottom" class="${lane.position==='bottom'?'active':''}">למטה</button>
          </div>
        </div>
        <div class="row"><label>סגנון</label>
          <div class="seg f-mode">
            <button data-v="scroll" class="${modeScroll?'active':''}">רץ</button>
            <button data-v="fade" class="${!modeScroll?'active':''}">מתחלף</button>
          </div>
        </div>
        <div class="row row-speed" style="${modeScroll?'':'display:none'}"><label>מהירות הריצה</label>
          <input type="range" class="f-speed" min="20" max="160" step="5" value="${esc(lane.speed)}"></div>
        <div class="row row-fade" style="${modeScroll?'display:none':''}"><label>זמן לכל פריט (שניות)</label>
          <input type="number" class="f-fadeSeconds" min="2" max="30" step="1" value="${esc(lane.fadeSeconds)}"></div>
        <div class="row"><label>גובה השורה</label>
          <input type="number" class="f-height" min="14" max="80" step="1" value="${esc(lane.height)}"></div>
        <div class="row"><label>גודל טקסט</label>
          <input type="number" class="f-fontSize" min="8" max="24" step="1" value="${esc(lane.fontSize)}"></div>
        <div class="row"><label>שקיפות הרקע</label>
          <input type="range" class="f-opacity" min="0.15" max="1" step="0.05" value="${esc(lane.opacity)}"></div>
        <div class="row"><label>צבעים</label>
          <div class="colors">
            <span class="c">רקע <input type="color" class="f-barColor" value="${esc(rgbToHex(lane.barRgb))}"></span>
            <span class="c">${isCal?'ברירת מחדל':'תגית'} <input type="color" class="f-badgeColor" value="${esc(lane.badgeBg)}"></span>
          </div>
        </div>
        <div class="row"><label>תדירות רענון (שניות)</label>
          <input type="number" class="f-refreshSeconds" min="30" max="1800" step="10" value="${esc(lane.refreshSeconds)}"></div>
        <div class="row"><label>קיצור הסתרה/הצגה</label>
          <input type="text" class="f-hotkey" value="${esc(lane.hotkey)}" placeholder="Command+Alt+N"></div>
        ${isRss ? `
          <div class="subttl">מקורות (RSS)</div>
          <div class="src-list"></div>
          <button class="addbtn f-addsrc">＋ הוסף מקור</button>` : ''}
        ${isCal ? `
          <div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--line)">
            <div class="row"><label>Google Client ID</label>
              <input type="text" class="f-gclient" style="min-width:220px" value="${esc(s.google.clientId)}" placeholder="…apps.googleusercontent.com"></div>
            <div class="row"><label>Google Client Secret</label>
              <input type="password" class="f-gsecret" style="min-width:220px" value="${esc(s.google.clientSecret)}" placeholder="GOCSPX-…"></div>
            <div class="row">
              <button class="btn sm primary g-connect">חבר יומן Google</button>
              <span class="gstatus"></span>
            </div>
            <div class="subttl">היומנים שלך — כבה/הדלק וקבע צבע לכל אחד</div>
            <div class="cals"><div class="hint">מתחבר…</div></div>
          </div>` : ''}
      </div>
    </div>`;
  }

  function generalCard() {
    return `
    <div class="card">
      <div class="row">
        <label>הפעל אוטומטית בהדלקת המחשב</label>
        <span class="toggle"><input type="checkbox" id="openAtLogin" ${s.openAtLogin?'checked':''}><span class="slider"></span></span>
      </div>
    </div>`;
  }

  function laneEl(id) { return document.querySelector('.lane[data-id="' + CSS.escape(id) + '"]'); }

  function render() {
    const tabs = s.lanes.map(l => ({ id:l.id, title:l.title, color:l.badgeBg }))
                        .concat([{ id:'__general', title:'כללי', color:null }]);
    el('tabs').innerHTML = tabs.map((t,i) =>
      `<button class="tab ${i===0?'active':''}" data-tab="${esc(t.id)}">${t.color?`<span class="dotc" style="background:${esc(t.color)}"></span>`:''}${escT(t.title)}</button>`
    ).join('');
    el('panels').innerHTML =
      s.lanes.map((l,i) => `<div class="panel ${i===0?'':'hidden'}" data-panel="${esc(l.id)}">${laneCard(l)}</div>`).join('') +
      `<div class="panel hidden" data-panel="__general">${generalCard()}</div>`;

    el('tabs').querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => {
      el('tabs').querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === b));
      el('panels').querySelectorAll('.panel').forEach(p => p.classList.toggle('hidden', p.dataset.panel !== b.dataset.tab));
    }));
    s.lanes.forEach(wireLane);
  }

  function wireLane(lane) {
    const card = laneEl(lane.id);
    card.querySelector('.f-enabled').addEventListener('change', e => {
      lane.enabled = e.target.checked;
      card.querySelector('.lane-body').classList.toggle('off', !lane.enabled);
    });
    card.querySelector('.f-position').addEventListener('click', e => {
      if (!e.target.dataset.v) return;
      lane.position = e.target.dataset.v;
      card.querySelectorAll('.f-position button').forEach(b => b.classList.toggle('active', b.dataset.v === lane.position));
    });
    card.querySelector('.f-mode').addEventListener('click', e => {
      if (!e.target.dataset.v) return;
      lane.mode = e.target.dataset.v;
      card.querySelectorAll('.f-mode button').forEach(b => b.classList.toggle('active', b.dataset.v === lane.mode));
      card.querySelector('.row-speed').style.display = lane.mode === 'scroll' ? '' : 'none';
      card.querySelector('.row-fade').style.display = lane.mode === 'scroll' ? 'none' : '';
    });
    card.querySelector('.f-badgeColor').addEventListener('input', e => {
      const tab = document.querySelector('.tab[data-tab="' + CSS.escape(lane.id) + '"] .dotc');
      if (tab) tab.style.background = e.target.value;
    });
    if (lane.kind === 'rss') renderSources(lane);
    if (lane.kind === 'calendar') {
      updateGStatus(card);
      card.querySelector('.g-connect').addEventListener('click', () => connectGoogle(lane, card));
      if (s.google.refreshToken) loadCalendars(lane, card);
      else card.querySelector('.cals').innerHTML = '<div class="hint">התחבר ליומן כדי לבחור יומנים.</div>';
    }
  }

  function renderSources(lane) {
    lane.sources = lane.sources || [];
    const wrap = laneEl(lane.id).querySelector('.src-list');
    wrap.innerHTML = lane.sources.map((src, i) => `
      <div class="src">
        <span class="toggle"><input type="checkbox" class="s-on" data-i="${i}" ${src.enabled?'checked':''}><span class="slider"></span></span>
        <input type="text" class="name s-name" data-i="${i}" value="${esc(src.name)}" placeholder="שם">
        <input type="text" class="s-url" data-i="${i}" value="${esc(src.url)}" placeholder="https://…/rss.xml">
        <button class="del s-del" data-i="${i}" title="מחק">🗑</button>
      </div>`).join('');
    wrap.querySelectorAll('.s-on').forEach(c => c.addEventListener('change', e => lane.sources[e.target.dataset.i].enabled = e.target.checked));
    wrap.querySelectorAll('.s-name').forEach(c => c.addEventListener('input', e => lane.sources[e.target.dataset.i].name = e.target.value));
    wrap.querySelectorAll('.s-url').forEach(c => c.addEventListener('input', e => lane.sources[e.target.dataset.i].url = e.target.value));
    wrap.querySelectorAll('.s-del').forEach(b => b.addEventListener('click', e => { lane.sources.splice(e.target.dataset.i, 1); renderSources(lane); }));
    laneEl(lane.id).querySelector('.f-addsrc').onclick = () => { lane.sources.push({ name:'מקור חדש', url:'', enabled:true }); renderSources(lane); };
  }

  async function loadCalendars(lane, card) {
    const wrap = card.querySelector('.cals');
    wrap.innerHTML = '<div class="hint">טוען יומנים…</div>';
    const res = await window.api.googleCalendars();
    if (!res || !res.ok) { wrap.innerHTML = '<div class="hint">שגיאה בטעינת יומנים.</div>'; return; }
    const saved = Array.isArray(lane.calendars) ? lane.calendars : [];
    lane.calendars = res.calendars.map(c => {
      const prev = saved.find(x => x.id === c.id) || {};
      return { id: c.id, name: c.name, enabled: prev.enabled !== false, color: prev.color || c.color };
    });
    renderCals(lane, card);
  }

  function renderCals(lane, card) {
    const wrap = card.querySelector('.cals');
    if (!lane.calendars.length) { wrap.innerHTML = '<div class="hint">לא נמצאו יומנים.</div>'; return; }
    wrap.innerHTML = lane.calendars.map((c, i) => `
      <div class="src">
        <span class="toggle"><input type="checkbox" class="cal-on" data-i="${i}" ${c.enabled!==false?'checked':''}><span class="slider"></span></span>
        <input type="color" class="cal-color" data-i="${i}" value="${esc(c.color)}">
        <span class="cal-name">${escT(c.name)}</span>
      </div>`).join('');
    wrap.querySelectorAll('.cal-on').forEach(x => x.addEventListener('change', e => lane.calendars[e.target.dataset.i].enabled = e.target.checked));
    wrap.querySelectorAll('.cal-color').forEach(x => x.addEventListener('input', e => lane.calendars[e.target.dataset.i].color = e.target.value));
  }

  function updateGStatus(card) {
    const st = card.querySelector('.gstatus');
    if (s.google.refreshToken) {
      st.className = 'gstatus ok';
      st.innerHTML = '✅ מחובר' + (s.google.email ? ' (' + escT(s.google.email) + ')' : '') + ' · <span class="glink g-disc">נתק</span>';
      const disc = st.querySelector('.g-disc');
      if (disc) disc.addEventListener('click', async () => {
        await window.api.disconnectGoogle();
        s.google.refreshToken = ''; s.google.email = '';
        updateGStatus(card);
        card.querySelector('.cals').innerHTML = '<div class="hint">התחבר ליומן כדי לבחור יומנים.</div>';
      });
    } else {
      st.className = 'gstatus'; st.textContent = 'לא מחובר';
    }
  }

  async function connectGoogle(lane, card) {
    const st = card.querySelector('.gstatus');
    s.google.clientId = card.querySelector('.f-gclient').value.trim();
    s.google.clientSecret = card.querySelector('.f-gsecret').value.trim();
    if (!s.google.clientId || !s.google.clientSecret) { st.className='gstatus err'; st.textContent='חסרים Client ID / Secret'; return; }
    st.className = 'gstatus'; st.textContent = 'פותח דפדפן להתחברות…';
    await window.api.saveSettings(collect());
    const res = await window.api.connectGoogle();
    if (res && res.ok) {
      s.google.refreshToken = 'connected'; s.google.email = res.email || '';
      updateGStatus(card);
      loadCalendars(lane, card);
    } else {
      st.className='gstatus err'; st.textContent = 'שגיאה: ' + (res && res.error ? res.error : 'לא ידועה');
    }
  }

  function collect() {
    s.lanes.forEach(lane => {
      const card = laneEl(lane.id);
      if (!card) return;
      lane.enabled = card.querySelector('.f-enabled').checked;
      lane.speed = +card.querySelector('.f-speed').value;
      lane.fadeSeconds = +card.querySelector('.f-fadeSeconds').value;
      lane.height = +card.querySelector('.f-height').value;
      lane.fontSize = +card.querySelector('.f-fontSize').value;
      lane.opacity = +card.querySelector('.f-opacity').value;
      lane.refreshSeconds = +card.querySelector('.f-refreshSeconds').value;
      lane.hotkey = card.querySelector('.f-hotkey').value.trim();
      lane.barRgb = hexToRgb(card.querySelector('.f-barColor').value);
      lane.badgeBg = card.querySelector('.f-badgeColor').value;
      if (lane.kind === 'rss') lane.sources = (lane.sources || []).filter(x => x.url && x.url.trim());
      if (lane.kind === 'calendar') {
        s.google.clientId = card.querySelector('.f-gclient').value.trim();
        s.google.clientSecret = card.querySelector('.f-gsecret').value.trim();
      }
    });
    const login = el('openAtLogin');
    if (login) s.openAtLogin = login.checked;
    return s;
  }

  el('save').addEventListener('click', async () => {
    await window.api.saveSettings(collect());
    const sv = el('saved'); sv.classList.add('show');
    setTimeout(() => sv.classList.remove('show'), 1600);
  });

  window.api.getSettings().then(cfg => {
    s = cfg;
    if (!s.google) s.google = { clientId:'', clientSecret:'', refreshToken:'', email:'' };
    render();
  });
</script>
</body>
</html>
